<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Rosier Photography</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div data-include="components/header.html"></div>  
  </header>
  <main>
    <section class="split">
      <div class="split-image">
        <img src="img/western/western7.jpg" alt="Contact Rosier Photography">
      </div>
      <div class="split-text">
        <h1>Contact</h1>
        <p>
          I'd love to hear from you.<br><br>
          Please reach out through Instagram or send an email to:<br><br>
          <strong>rosierphotography@email.com</strong><br><br>
          <a href="https://instagram.com/rosier_photography" target="_blank" aria-label="Instagram" class="contact-instagram">
            <i class="fab fa-instagram"></i>
          </a>
        </p>
        <div class="email-box">
          <form onsubmit="sendMessage(event)" class="contact-form">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
          
            <label for="email">Your Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
          
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>
          
            <button type="submit">Send Message</button>
          </form>
        </div>            
      </div>
    </section>
  </main>   

  <footer>
    <div data-include="components/footer.html"></div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
<script>
  function sendMessage(event) {
    event.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !message) {
      alert('Please fill out all fields.');
      return;
    }
    alert('Thank you, ' + name + '! Your message has been sent.');
    document.querySelector('.contact-form').reset();
  }
</script>
</body>
</html>
